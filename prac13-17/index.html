<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заметки 13-16</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Заметки" />

  <link rel="apple-touch-icon" href="./icons/favicon-128x128.png" />
  <link rel="icon" href="./icons/favicon.ico" sizes="16x16" type="image/x-icon" />
  <link rel="icon" href="./icons/favicon-32x32.png" sizes="32x32" type="image/png" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="shell-header">
      <div class="shell-header__top">
        <div>
          <h1>Заметки</h1>
        </div>
        <div class="status-panel">
          <span class="status-pill" id="network-status">Онлайн</span>
          <span class="status-pill" id="secure-status">HTTP</span>
        </div>
      </div>

      <nav class="tabbar" aria-label="Основная навигация">
        <button id="home-btn" class="tabbar__button is-active" type="button">Главная</button>
        <button id="about-btn" class="tabbar__button" type="button">О приложении</button>
      </nav>
    </header>

    <main id="app-content" class="content-host" aria-live="polite">
      <div class="loader-card">
        <p>Загрузка интерфейса...</p>
      </div>
    </main>

    <footer class="shell-footer">
      <div class="footer-actions">
        <button id="enable-push" class="ghost-button" type="button">Включить уведомления</button>
        <button id="disable-push" class="ghost-button ghost-button--danger" type="button" hidden>Отключить уведомления</button>
      </div>
      <p class="footer-note">Простое приложение для заметок.</p>
    </footer>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./app.js"></script>
</body>
</html>
