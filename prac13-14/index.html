<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Для Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Цвет темы для браузера -->
  <meta name="theme-color" content="#2563eb" />

  <!-- Для iOS -->
  <link rel="apple-touch-icon" href="/icons/favicon-152x152.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Заметки" />

  <title>Мои заметки</title>

  <!-- Favicon -->
  <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/x-icon" />
  <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">
          <span class="logo-icon">📝</span>
          <h1 class="header__title">Мои заметки</h1>
        </div>
        <div class="header__status" id="online-status">
          <span class="status-dot"></span>
          <span class="status-text">онлайн</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="input-section">
        <form id="note-form" class="note-form" novalidate>
          <div class="form-group">
            <textarea
              id="note-input"
              class="note-input"
              placeholder="Что нужно запомнить?.."
              rows="3"
              required
            ></textarea>
          </div>
          <div class="form-actions">
            <span class="char-count" id="char-count">0 / 300</span>
            <button type="submit" class="btn-add" id="submit-btn">
              <span class="btn-icon">+</span>
              <span>Добавить</span>
            </button>
          </div>
        </form>
      </section>

      <section class="notes-section">
        <div class="notes-header">
          <h2 class="notes-title">Записи</h2>
          <div class="notes-meta">
            <span class="notes-count" id="notes-count">0 заметок</span>
            <button class="btn-clear" id="clear-btn" title="Удалить всё">🗑</button>
          </div>
        </div>

        <div id="notes-empty" class="notes-empty">
          <div class="empty-icon">🌿</div>
          <p>Пока нет заметок.<br/>Добавьте первую!</p>
        </div>

        <ul id="notes-list" class="notes-list" aria-label="Список заметок"></ul>
      </section>
    </main>

    <div class="offline-banner" id="offline-banner" hidden>
      📵 Офлайн-режим — новые данные не загружаются, но всё работает!
    </div>

    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
